name: tekton_app
description: "Tekton — Native Extensible AI Platform"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP server (for server mode)
  shelf: ^1.4.0
  shelf_router: ^1.1.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

  # Networking
  http: ^1.3.0
  web_socket_channel: ^3.0.2
  dio: ^5.8.0

  # Crypto & Security
  crypto: ^3.0.6
  encrypt: ^5.0.3

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_markdown: ^0.7.7
  flutter_syntax_view: ^4.1.1
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  flutter_treeview: ^1.0.1

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  permission_handler: ^11.3.1
  share_plus: ^10.1.4
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.4
  device_info_plus: ^11.3.0
  package_info_plus: ^8.3.0

  # FFI for llama.cpp
  ffi: ^2.1.4

  # Audio (Phase 5)
  record: ^6.2.0
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.15
  # hive_generator conflicts with riverpod_generator, will manage adapters manually
  # hive_generator: ^2.0.1
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  adaptive_icon_background: "#0f172a"
  adaptive_icon_foreground: "assets/icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/