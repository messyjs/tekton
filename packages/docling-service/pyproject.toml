[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "tekton-docling"
version = "1.0.0"
description = "Tekton Docling sidecar – document parsing, OCR, and chunking via FastAPI + MCP"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
dependencies = [
    "docling>=2.31",
    "fastapi>=0.110",
    "uvicorn>=0.29",
    "python-multipart>=0.0.9",
]

[project.optional-dependencies]
ocr = ["easyocr>=1.7"]
vlm = ["docling[vlm]"]
dev = ["pytest>=8.0", "httpx>=0.27"]

[project.scripts]
tekton-docling = "tekton_docling.server:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"